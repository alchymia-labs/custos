# =============================================================================
# The Alephain Guild - 基础策略配置
# =============================================================================
# 通用配置，适用于所有策略
# 策略可在自身 config.yaml 中覆盖这些默认值
# =============================================================================

# =============================================================================
# 交易配置
# =============================================================================
trading:
  _section:
    title: "交易配置"
  connector:
    value: "binance_perpetual"
    type: string
    title: "交易所连接器"
    enum: ["binance", "binance_perpetual", "okx_perpetual", "kucoin"]
    description: "交易所连接器名称"
  leverage:
    value: 1
    type: integer
    title: "杠杆倍数"
    minimum: 1
    maximum: 125
    description: "合约杠杆倍数 (仅永续合约)"
  pairs:
    value: ["BTC-USDT"]
    type: array
    title: "交易对"
    description: "交易对列表 (多币种支持)"
  direction:
    value: "both"
    type: string
    title: "交易方向"
    enum: ["long", "short", "both"]
    description: "允许的交易方向"
  order_type:
    value: "limit"
    type: string
    title: "订单类型"
    enum: ["market", "limit"]
    description: "开仓订单类型"
  position_mode:
    value: "ONEWAY"
    type: string
    title: "仓位模式"
    enum: ["ONEWAY", "HEDGE"]
    description: "单向持仓或对冲模式"
  fees:
    _section:
      title: "手续费配置"
    maker:
      value: 0.0002
      type: number
      title: "Maker 手续费"
      description: "限价单成交手续费 (0.0002 = 0.02%)"
      minimum: 0
      maximum: 0.01
    taker:
      value: 0.0004
      type: number
      title: "Taker 手续费"
      description: "市价单成交手续费 (0.0004 = 0.04%)"
      minimum: 0
      maximum: 0.01
    funding_rate:
      value: 0.0
      type: number
      title: "资金费率"
      description: "永续合约资金费率 (仅用于成本估算, 实际由交易所计算)"
      minimum: -0.01
      maximum: 0.01

  # 嵌套子节: execution
  execution:
    _section:
      title: "订单执行配置"
    price_type:
      value: "mid"
      type: string
      title: "下单价格类型"
      enum: ["mid", "bid", "ask"]
      description: "中间价/买一/卖一"
    limit_order_timeout:
      value: 60
      type: integer
      title: "限价单超时"
      minimum: 0
      maximum: 300
      description: "限价单超时时间 (秒)"
    slippage_tolerance:
      value: 0.001
      type: number
      title: "滑点容忍度"
      minimum: 0.0001
      maximum: 0.01
      description: "最大滑点容忍度 (0.001 = 0.1%)"
    retry_on_failure:
      value: true
      type: boolean
      title: "失败重试"
      description: "下单失败是否重试"
    max_retries:
      value: 3
      type: integer
      title: "最大重试次数"
      minimum: 1
      maximum: 10
    split_orders:
      _section:
        title: "拆单配置"
      enabled:
        value: false
        type: boolean
        title: "启用拆单"
        description: "大单拆分执行减少冲击成本"
      max_single_order_pct:
        value: 0.1
        type: number
        title: "单笔最大比例"
        minimum: 0.05
        maximum: 0.5
        description: "单笔订单占总仓位的最大比例"
      interval_ms:
        value: 1000
        type: integer
        title: "拆单间隔"
        minimum: 100
        maximum: 10000
        description: "毫秒, 每笔子订单间隔时间"
    price_improvement:
      _section:
        title: "价格优化"
      enabled:
        value: false
        type: boolean
        title: "启用价格优化"
      wait_for_pullback:
        value: false
        type: boolean
        title: "等待回调入场"
        description: "趋势信号后等待小幅回调再入场"
      pullback_pct:
        value: 0.002
        type: number
        title: "回调幅度"
        minimum: 0.001
        maximum: 0.01
        description: "等待回调的百分比"
      pullback_timeout:
        value: 300
        type: integer
        title: "回调等待超时"
        minimum: 60
        maximum: 3600
        description: "秒, 超时后按市价入场"

# =============================================================================
# 仓位管理
# =============================================================================
position:
  _section:
    title: "仓位管理"
  size_type:
    value: "percentage"
    type: string
    title: "仓位计算方式"
    enum: ["percentage", "fixed", "kelly", "fixed_risk"]
    description: "仓位大小计算方法 (fixed_risk: 按止损距离反推, 用 fixed_risk.risk_pct, 需配置止损)"
  size_value:
    value: 0.1
    type: number
    title: "仓位大小"
    minimum: 0.01
    maximum: 1.0
    description: "仓位比例 (percentage 模式) 或固定金额 (fixed 模式)"
    optimization:
      enabled: true
      range: [0.05, 0.3]
      step: 0.05
  capital_mode:
    value: "compound"
    type: string
    title: "资金模式"
    enum: ["compound", "fixed_capital"]
    description: "复利或固定本金模式"
  initial_capital:
    value: 10000
    type: number
    title: "初始本金"
    minimum: 100
    description: "fixed_capital 模式使用的初始本金"
  base_size_factor:
    value: 1.0
    type: number
    title: "基础仓位系数"
    minimum: 0.1
    maximum: 1.0
    description: "全局仓位乘数，用于统一缩减所有仓位大小 (1.0 = 不缩减)"

  # 嵌套子节: kelly
  kelly:
    _section:
      title: "凯利公式参数"
      description: "size_type: kelly 时使用"
    fraction:
      value: 0.25
      type: number
      title: "凯利系数"
      minimum: 0.1
      maximum: 1.0
      description: "建议 0.25-0.5 (1/4 到 1/2 凯利)"
    win_rate:
      value: 0.55
      type: number
      title: "历史胜率"
      minimum: 0.1
      maximum: 0.9
    payoff_ratio:
      value: 2.0
      type: number
      title: "盈亏比"
      minimum: 0.5
      maximum: 10.0
      description: "平均盈利/平均亏损"

  # 嵌套子节: fixed_risk (size_type: fixed_risk 时使用)
  fixed_risk:
    _section:
      title: "固定风险参数"
      description: "size_type: fixed_risk 时使用; 用原生 FixedRiskSizer 按止损距离反推仓位"
    risk_pct:
      value: 0.01
      type: number
      title: "单笔风险比例"
      minimum: 0.001
      maximum: 0.1
      description: "每笔交易愿承担的权益比例 (小数, 0.01 = 1%); 触发止损即亏该比例"

  # 嵌套子节: scaling
  scaling:
    _section:
      title: "加仓配置"
    enabled:
      value: false
      type: boolean
      title: "启用加仓"
      description: "是否启用分批建仓"
    method:
      value: "pyramid"
      type: string
      title: "加仓方法"
      enum: ["pyramid", "fixed", "martingale"]
      description: "金字塔/固定/马丁格尔"
    max_entries:
      value: 3
      type: integer
      title: "最大入场次数"
      minimum: 1
      maximum: 10
      description: "包括初始仓位的最大入场次数"
      optimization:
        enabled: true
        range: [1, 5]
        step: 1
    entry_interval_pct:
      value: 0.02
      type: number
      title: "加仓间隔"
      minimum: 0.005
      maximum: 0.1
      description: "价格变动百分比触发加仓"
      optimization:
        enabled: true
        range: [0.01, 0.05]
        step: 0.005
    pyramid:
      scale_factor:
        value: 0.5
        type: number
        title: "金字塔递减比例"
        minimum: 0.1
        maximum: 1.0
        description: "第2次=初始×0.5, 第3次=初始×0.25"
    fixed:
      size_per_entry:
        value: 0.1
        type: number
        title: "固定加仓比例"
        minimum: 0.01
        maximum: 0.5
        description: "每次加仓的仓位比例"
    martingale:
      multiplier:
        value: 2.0
        type: number
        title: "马丁格尔倍数"
        minimum: 1.5
        maximum: 3.0
        description: "加倍系数 (高风险)"

  # 嵌套子节: limits
  limits:
    _section:
      title: "仓位限制"
    max_positions_per_pair:
      value: 1
      type: integer
      title: "每交易对最大持仓"
      minimum: 1
      maximum: 10
    min_order_size:
      value: 10
      type: number
      title: "最小订单金额"
      minimum: 1
      description: "报价货币计价"
    max_position_pct:
      value: 0.5
      type: number
      title: "最大仓位比例"
      minimum: 0.1
      maximum: 1.0
      description: "单品种最大仓位占总资金比例"
    max_total_positions:
      value: 5
      type: integer
      title: "最大总持仓数"
      minimum: 1
      maximum: 20
      description: "所有交易对的总持仓数量上限"
    max_total_exposure:
      value: 0.8
      type: number
      title: "最大总敞口"
      minimum: 0.1
      maximum: 1.0
      description: "所有持仓占总资金的比例上限"
    max_correlated_exposure:
      value: 0.5
      type: number
      title: "相关资产最大敞口"
      minimum: 0.1
      maximum: 1.0
      description: "同类资产 (如 BTC+ETH) 最大总敞口"
    correlation_groups:
      value: []
      type: array
      title: "相关性分组"
      description: "例如 [['BTC-USDT', 'ETH-USDT'], ['SOL-USDT', 'AVAX-USDT']]"
    max_trade_size:
      value: null
      type: number
      title: "最大单笔交易金额"
      description: "交易所限制的最大订单金额 (null = 不限制)"

  # 嵌套子节: dynamic_sizing
  dynamic_sizing:
    _section:
      title: "动态仓位调整"
    enabled:
      value: false
      type: boolean
      title: "启用动态仓位"
      description: "根据市场状态和信号强度调整仓位"
    volatility_adjustment:
      _section:
        title: "波动率调整"
      enabled:
        value: false
        type: boolean
        title: "波动率调整"
        description: "高波动时减仓，低波动时加仓"
      target_volatility:
        value: 0.02
        type: number
        title: "目标波动率"
        minimum: 0.005
        maximum: 0.1
        description: "日波动率目标 (2%)"
      lookback:
        value: 20
        type: integer
        title: "波动率回溯期"
        minimum: 5
        maximum: 60
      min_multiplier:
        value: 0.5
        type: number
        title: "最小调整系数"
        minimum: 0.1
        maximum: 1.0
      max_multiplier:
        value: 1.5
        type: number
        title: "最大调整系数"
        minimum: 1.0
        maximum: 3.0
    streak_adjustment:
      _section:
        title: "连续盈亏调整"
      enabled:
        value: false
        type: boolean
        title: "盈亏连续调整"
        description: "连续亏损后减仓，连续盈利后适度加仓"
      loss_reduction:
        value: 0.2
        type: number
        title: "亏损减仓比例"
        minimum: 0.05
        maximum: 0.5
        description: "每连续亏损一次减少 20%"
      win_increase:
        value: 0.1
        type: number
        title: "盈利加仓比例"
        minimum: 0.05
        maximum: 0.3
        description: "每连续盈利一次增加 10%"
      max_streak_adjustment:
        value: 3
        type: integer
        title: "最大调整次数"
        minimum: 1
        maximum: 5
        description: "最多计算连续 3 次"

# =============================================================================
# 风险管理
# =============================================================================
risk:
  _section:
    title: "风险管理"

  # 全局风控
  global:
    _section:
      title: "全局风控"
      description: "账户/组合级别风控"
    max_daily_loss:
      value: 0.05
      type: number
      title: "每日最大亏损"
      minimum: 0.01
      maximum: 0.2
      description: "触发暂停交易的每日亏损比例"
    max_drawdown:
      value: 0.10
      type: number
      title: "最大回撤"
      minimum: 0.05
      maximum: 0.5
      description: "触发暂停的最大回撤比例"
    consecutive_loss_pause:
      value: 3
      type: integer
      title: "连续亏损暂停"
      minimum: 1
      maximum: 10
      description: "连续亏损 N 次后暂停交易"
    max_daily_trades:
      value: 0
      type: integer
      title: "每日最大交易次数"
      minimum: 0
      description: "0 = 不限制"
    max_daily_profit:
      value: 0
      type: number
      title: "每日最大盈利"
      minimum: 0
      maximum: 1.0
      description: "达到目标盈利后暂停 (0 = 不限制)"
    reset_time:
      value: "00:00"
      type: string
      title: "风控重置时间"
      description: "UTC 时间, 每日风控计数器重置时间"
    pause_duration:
      value: 0
      type: integer
      title: "触发后暂停时长"
      minimum: 0
      description: "秒, 0 = 暂停至下个交易日"

  # 单次交易风控
  trade:
    _section:
      title: "单次交易风控"
    sl_tp_mode:
      value: "hybrid"
      type: string
      title: "SL/TP 执行模式"
      enum: ["exchange", "tick", "hybrid", "native_trailing"]
      description: |
        exchange: SL/TP 都用交易所挂单
        tick: SL/TP 都用 Tick 监控
        hybrid: SL 交易所 + TP/移动止损用 Tick (推荐)
        native_trailing: 交易所原生移动止损 (TrailingStopMarketOrder)
    max_loss_pct:
      value: 0.02
      type: number
      title: "单次最大亏损"
      minimum: 0.005
      maximum: 0.1
      description: "单次交易最大亏损百分比"
    time_limit:
      value: 604800
      type: integer
      title: "最大持仓时间"
      minimum: 3600
      description: "秒, 604800 = 7天"
    atr_period:
      value: 14
      type: integer
      title: "ATR 周期"
      minimum: 5
      maximum: 50
      description: "用于止损/止盈计算的 ATR 周期"

    # 止盈配置
    take_profit:
      _section:
        title: "止盈配置"
      method:
        value: "atr"
        type: string
        title: "止盈方法"
        enum: ["atr", "fixed", "trailing", "scaled", "none"]
        description: "止盈计算方式 (scaled: 分批止盈)"
      atr:
        multiplier:
          value: 6.0
          type: number
          title: "止盈 ATR 乘数"
          minimum: 1.0
          maximum: 20.0
          description: "ATR 止盈乘数"
          optimization:
            enabled: true
            range: [3.0, 12.0]
            step: 1.0
      fixed:
        value:
          value: 0.04
          type: number
          title: "固定止盈比例"
          minimum: 0.01
          maximum: 0.2
          description: "固定止盈百分比"
      trailing:
        activation_pct:
          value: 0.03
          type: number
          title: "移动止盈激活点"
          minimum: 0.01
          maximum: 0.1
          description: "盈利多少后激活"
        callback_pct:
          value: 0.01
          type: number
          title: "回调触发比例"
          minimum: 0.005
          maximum: 0.05
          description: "回撤多少触发止盈"
      scaled:
        _section:
          title: "分批止盈"
          description: "method: scaled 时使用"
        levels:
          value: 3
          type: integer
          title: "止盈层级数"
          minimum: 2
          maximum: 5
        level_1:
          target_pct:
            value: 0.02
            type: number
            title: "第一层目标"
            minimum: 0.005
            maximum: 0.1
            description: "盈利 2% 触发"
          exit_pct:
            value: 0.33
            type: number
            title: "平仓比例"
            minimum: 0.1
            maximum: 0.5
            description: "平掉 33% 仓位"
        level_2:
          target_pct:
            value: 0.04
            type: number
            title: "第二层目标"
            minimum: 0.01
            maximum: 0.15
          exit_pct:
            value: 0.33
            type: number
            title: "平仓比例"
            minimum: 0.1
            maximum: 0.5
        level_3:
          target_pct:
            value: 0.06
            type: number
            title: "第三层目标"
            minimum: 0.02
            maximum: 0.2
          exit_pct:
            value: 0.34
            type: number
            title: "平仓比例"
            minimum: 0.1
            maximum: 1.0
            description: "剩余全部平仓"

    # 止损配置
    stop_loss:
      _section:
        title: "止损配置"
      method:
        value: "atr"
        type: string
        title: "止损方法"
        enum: ["atr", "fixed", "trailing", "indicator", "none"]
        description: "止损计算方式"
      atr:
        multiplier:
          value: 2.0
          type: number
          title: "止损 ATR 乘数"
          minimum: 0.5
          maximum: 10.0
          description: "ATR 止损乘数"
          optimization:
            enabled: true
            range: [1.0, 5.0]
            step: 0.5
      fixed:
        value:
          value: 0.02
          type: number
          title: "固定止损比例"
          minimum: 0.005
          maximum: 0.1
          description: "固定止损百分比"
      trailing:
        _section:
          title: "移动止损"
        enabled:
          value: false
          type: boolean
          title: "启用移动止损"
          description: "是否启用跟踪止损"
        activation_pct:
          value: 0.02
          type: number
          title: "激活点"
          minimum: 0.01
          maximum: 0.1
          description: "盈利多少后激活"
        trailing_pct:
          value: 0.015
          type: number
          title: "跟踪距离"
          minimum: 0.005
          maximum: 0.05
          description: "价格回撤多少触发止损"
      indicator:
        type:
          value: "supertrend"
          type: string
          title: "指标类型"
          enum: ["supertrend", "ma", "sar"]
          description: "用于止损的指标"
      break_even:
        _section:
          title: "保本止损"
          description: "达到目标盈利后将止损移至入场价"
        enabled:
          value: false
          type: boolean
          title: "启用保本止损"
        activation_pct:
          value: 0.015
          type: number
          title: "激活点"
          minimum: 0.005
          maximum: 0.05
          description: "盈利达到 1.5% 后激活"
        offset:
          value: 0.001
          type: number
          title: "偏移量"
          minimum: 0
          maximum: 0.005
          description: "止损设在入场价上方 0.1% (覆盖手续费)"

  # Tick 级别监控
  tick_monitoring:
    _section:
      title: "Tick 级别监控"
      description: "使用实时 tick 数据监控止损/止盈触发"
    enabled:
      value: true
      type: boolean
      title: "启用 Tick 监控"
      description: "启用后将订阅 tick 数据实时检查 SL/TP"
    tick_type:
      value: "trade"
      type: string
      title: "Tick 类型"
      enum: ["trade", "quote", "both"]
      description: "trade: 成交数据; quote: 报价数据; both: 两者"

# =============================================================================
# 信号过滤器
# =============================================================================
filters:
  _section:
    title: "信号过滤器"

  adx_filter:
    _section:
      title: "ADX 趋势过滤"
    enabled:
      value: false
      type: boolean
      title: "启用 ADX 过滤"
      description: "使用 ADX 过滤弱趋势信号"
    period:
      value: 14
      type: integer
      title: "ADX 周期"
      minimum: 7
      maximum: 30
    threshold:
      value: 25
      type: number
      title: "ADX 阈值"
      minimum: 15
      maximum: 50
      description: "ADX 高于此值才允许开仓"
      optimization:
        enabled: true
        range: [20, 40]
        step: 5

  volatility_filter:
    _section:
      title: "波动率过滤"
    enabled:
      value: false
      type: boolean
      title: "启用波动率过滤"
      description: "过滤低/高波动率时段"
    min_atr_pct:
      value: 0.003
      type: number
      title: "最小 ATR 比例 (小数, 0.003=0.3%)"
      minimum: 0.001
      maximum: 0.01
      description: "ATR/价格 低于此小数比例不开仓"
    max_atr_pct:
      value: 0.05
      type: number
      title: "最大 ATR 比例 (小数, 0.05=5%)"
      minimum: 0.01
      maximum: 0.1
      description: "ATR/价格 高于此小数比例不开仓 (避免极端波动)"
    atr_lookback:
      value: 14
      type: integer
      title: "ATR 回溯周期"
      minimum: 5
      maximum: 50
      description: "波动率计算周期 (默认使用策略 atr_period)"

  volume_filter:
