# =============================================================================
trading:
  _section:
    title: "General"
  connector:
    value: "binance_perpetual"
    type: string
    title: "General"
    enum: ["binance", "binance_perpetual", "okx_perpetual", "kucoin"]
    description: "No description"
  leverage:
    value: 1
    type: integer
    title: "General"
    minimum: 1
    maximum: 125
    description: "No description"
  pairs:
    value: ["BTC-USDT"]
    type: array
    title: "General"
    description: "No description"
  direction:
    value: "both"
    type: string
    title: "General"
    enum: ["long", "short", "both"]
    description: "No description"
  order_type:
    value: "limit"
    type: string
    title: "General"
    enum: ["market", "limit"]
    description: "No description"
  position_mode:
    value: "ONEWAY"
    type: string
    title: "General"
    enum: ["ONEWAY", "HEDGE"]
    description: "No description"
  fees:
    _section:
      title: "General"
    maker:
      value: 0.0002
      type: number
      title: "Maker "
      description: " (0.0002 = 0.02%)"
      minimum: 0
      maximum: 0.01
    taker:
      value: 0.0004
      type: number
      title: "Taker "
      description: " (0.0004 = 0.04%)"
      minimum: 0
      maximum: 0.01
    funding_rate:
      value: 0.0
      type: number
      title: "General"
      description: "No description"
      minimum: -0.01
      maximum: 0.01

  # : execution
  execution:
    _section:
      title: "General"
    price_type:
      value: "mid"
      type: string
      title: "General"
      enum: ["mid", "bid", "ask"]
      description: "No description"
    limit_order_timeout:
      value: 60
      type: integer
      title: "General"
      minimum: 0
      maximum: 300
      description: "No description"
    slippage_tolerance:
      value: 0.001
      type: number
      title: "General"
      minimum: 0.0001
      maximum: 0.01
      description: " (0.001 = 0.1%)"
    retry_on_failure:
      value: true
      type: boolean
      title: "General"
      description: "No description"
    max_retries:
      value: 3
      type: integer
      title: "General"
      minimum: 1
      maximum: 10
    split_orders:
      _section:
        title: "General"
      enabled:
        value: false
        type: boolean
        title: "General"
        description: "No description"
      max_single_order_pct:
        value: 0.1
        type: number
        title: "General"
        minimum: 0.05
        maximum: 0.5
        description: "No description"
      interval_ms:
        value: 1000
        type: integer
        title: "General"
        minimum: 100
        maximum: 10000
        description: "No description"
    price_improvement:
      _section:
        title: "General"
      enabled:
        value: false
        type: boolean
        title: "General"
      wait_for_pullback:
        value: false
        type: boolean
        title: "General"
        description: "No description"
      pullback_pct:
        value: 0.002
        type: number
        title: "General"
        minimum: 0.001
        maximum: 0.01
        description: "No description"
      pullback_timeout:
        value: 300
        type: integer
        title: "General"
        minimum: 60
        maximum: 3600
        description: "No description"

# =============================================================================
#
# =============================================================================
position:
  _section:
    title: "General"
  size_type:
    value: "percentage"
    type: string
    title: "General"
    enum: ["percentage", "fixed", "kelly", "fixed_risk"]
    description: " (fixed_risk: ,  fixed_risk.risk_pct, )"
  size_value:
    value: 0.1
    type: number
    title: "General"
    minimum: 0.01
    maximum: 1.0
    description: " (percentage )  (fixed )"
    optimization:
      enabled: true
      range: [0.05, 0.3]
      step: 0.05
  capital_mode:
    value: "compound"
    type: string
    title: "General"
    enum: ["compound", "fixed_capital"]
    description: "No description"
  initial_capital:
    value: 10000
    type: number
    title: "General"
    minimum: 100
    description: "fixed_capital "
  base_size_factor:
    value: 1.0
    type: number
    title: "General"
    minimum: 0.1
    maximum: 1.0
    description: " (1.0 = )"

  # : kelly
  kelly:
    _section:
      title: "General"
      description: "size_type: kelly "
    fraction:
      value: 0.25
      type: number
      title: "General"
      minimum: 0.1
      maximum: 1.0
      description: " 0.25-0.5 (1/4  1/2 )"
    win_rate:
      value: 0.55
      type: number
      title: "General"
      minimum: 0.1
      maximum: 0.9
    payoff_ratio:
      value: 2.0
      type: number
      title: "General"
      minimum: 0.5
      maximum: 10.0
      description: "No description"

  # : fixed_risk (size_type: fixed_risk )
  fixed_risk:
    _section:
      title: "General"
      description: "size_type: fixed_risk ;  FixedRiskSizer "
    risk_pct:
      value: 0.01
      type: number
      title: "General"
      minimum: 0.001
      maximum: 0.1
      description: " (, 0.01 = 1%); "

  # : scaling
  scaling:
    _section:
      title: "General"
    enabled:
      value: false
      type: boolean
      title: "General"
      description: "No description"
    method:
      value: "pyramid"
      type: string
      title: "General"
      enum: ["pyramid", "fixed", "martingale"]
      description: "No description"
    max_entries:
      value: 3
      type: integer
      title: "General"
      minimum: 1
      maximum: 10
      description: "No description"
      optimization:
        enabled: true
        range: [1, 5]
        step: 1
    entry_interval_pct:
      value: 0.02
      type: number
      title: "General"
      minimum: 0.005
      maximum: 0.1
      description: "No description"
      optimization:
        enabled: true
        range: [0.01, 0.05]
        step: 0.005
    pyramid:
      scale_factor:
        value: 0.5
        type: number
        title: "General"
        minimum: 0.1
        maximum: 1.0
        description: "2=×0.5, 3=×0.25"
    fixed:
      size_per_entry:
        value: 0.1
        type: number
        title: "General"
        minimum: 0.01
        maximum: 0.5
        description: "No description"
    martingale:
      multiplier:
        value: 2.0
        type: number
        title: "General"
        minimum: 1.5
        maximum: 3.0
        description: "No description"

  # : limits
  limits:
    _section:
      title: "General"
    max_positions_per_pair:
      value: 1
      type: integer
      title: "General"
      minimum: 1
      maximum: 10
    min_order_size:
      value: 10
      type: number
      title: "General"
      minimum: 1
      description: "No description"
    max_position_pct:
      value: 0.5
      type: number
      title: "General"
      minimum: 0.1
      maximum: 1.0
      description: "No description"
    max_total_positions:
      value: 5
      type: integer
      title: "General"
      minimum: 1
      maximum: 20
      description: "No description"
    max_total_exposure:
      value: 0.8
      type: number
      title: "General"
      minimum: 0.1
      maximum: 1.0
      description: "No description"
    max_correlated_exposure:
      value: 0.5
      type: number
      title: "General"
      minimum: 0.1
      maximum: 1.0
      description: " ( BTC+ETH) "
    correlation_groups:
      value: []
      type: array
      title: "General"
      description: " [['BTC-USDT', 'ETH-USDT'], ['SOL-USDT', 'AVAX-USDT']]"
    max_trade_size:
      value: null
      type: number
      title: "General"
      description: " (null = )"

  # : dynamic_sizing
  dynamic_sizing:
    _section:
      title: "General"
    enabled:
      value: false
      type: boolean
      title: "General"
      description: "No description"
    volatility_adjustment:
      _section:
        title: "General"
      enabled:
        value: false
        type: boolean
        title: "General"
        description: "No description"
      target_volatility:
        value: 0.02
        type: number
        title: "General"
        minimum: 0.005
        maximum: 0.1
        description: " (2%)"
      lookback:
        value: 20
        type: integer
        title: "General"
        minimum: 5
        maximum: 60
      min_multiplier:
        value: 0.5
        type: number
        title: "General"
        minimum: 0.1
        maximum: 1.0
      max_multiplier:
        value: 1.5
        type: number
        title: "General"
        minimum: 1.0
        maximum: 3.0
    streak_adjustment:
      _section:
        title: "General"
      enabled:
        value: false
        type: boolean
        title: "General"
        description: "No description"
      loss_reduction:
        value: 0.2
        type: number
        title: "General"
        minimum: 0.05
        maximum: 0.5
        description: " 20%"
      win_increase:
        value: 0.1
        type: number
        title: "General"
        minimum: 0.05
        maximum: 0.3
        description: " 10%"
      max_streak_adjustment:
        value: 3
        type: integer
        title: "General"
        minimum: 1
        maximum: 5
        description: " 3 "

# =============================================================================
#
# =============================================================================
risk:
  _section:
    title: "General"

  #
  global:
    _section:
      title: "General"
      description: "No description"
    max_daily_loss:
      value: 0.05
      type: number
      title: "General"
      minimum: 0.01
      maximum: 0.2
      description: "No description"
    max_drawdown:
      value: 0.10
      type: number
      title: "General"
      minimum: 0.05
      maximum: 0.5
      description: "No description"
    consecutive_loss_pause:
      value: 3
      type: integer
      title: "General"
      minimum: 1
      maximum: 10
      description: " N "
    max_daily_trades:
      value: 0
      type: integer
      title: "General"
      minimum: 0
      description: "0 = "
    max_daily_profit:
      value: 0
      type: number
      title: "General"
      minimum: 0
      maximum: 1.0
      description: " (0 = )"
    reset_time:
      value: "00:00"
      type: string
      title: "General"
      description: "UTC , "
    pause_duration:
      value: 0
      type: integer
      title: "General"
      minimum: 0
      description: ", 0 = "

  #
  trade:
    _section:
      title: "General"
    sl_tp_mode:
      value: "hybrid"
      type: string
      title: "SL/TP "
      enum: ["exchange", "tick", "hybrid", "native_trailing"]
      description: |
        exchange: SL/TP
        tick: SL/TP  Tick
        hybrid: SL  + TP/ Tick ()
        native_trailing:  (TrailingStopMarketOrder)
    max_loss_pct:
      value: 0.02
      type: number
      title: "General"
      minimum: 0.005
      maximum: 0.1
      description: "No description"
    time_limit:
      value: 604800
      type: integer
      title: "General"
      minimum: 3600
      description: ", 604800 = 7"
    atr_period:
      value: 14
      type: integer
      title: "ATR "
      minimum: 5
      maximum: 50
      description: "/ ATR "

    #
    take_profit:
      _section:
        title: "General"
      method:
        value: "atr"
        type: string
        title: "General"
        enum: ["atr", "fixed", "trailing", "scaled", "none"]
        description: " (scaled: )"
      atr:
        multiplier:
          value: 6.0
          type: number
          title: " ATR "
          minimum: 1.0
          maximum: 20.0
          description: "ATR "
          optimization:
            enabled: true
            range: [3.0, 12.0]
            step: 1.0
      fixed:
        value:
          value: 0.04
          type: number
          title: "General"
          minimum: 0.01
          maximum: 0.2
          description: "No description"
      trailing:
        activation_pct:
          value: 0.03
          type: number
          title: "General"
          minimum: 0.01
          maximum: 0.1
          description: "No description"
        callback_pct:
          value: 0.01
          type: number
          title: "General"
          minimum: 0.005
          maximum: 0.05
          description: "No description"
      scaled:
        _section:
          title: "General"
          description: "method: scaled "
        levels:
          value: 3
          type: integer
          title: "General"
          minimum: 2
          maximum: 5
        level_1:
          target_pct:
            value: 0.02
            type: number
            title: "General"
            minimum: 0.005
            maximum: 0.1
            description: " 2% "
          exit_pct:
            value: 0.33
            type: number
            title: "General"
            minimum: 0.1
            maximum: 0.5
            description: " 33% "
        level_2:
          target_pct:
            value: 0.04
            type: number
            title: "General"
            minimum: 0.01
            maximum: 0.15
          exit_pct:
            value: 0.33
            type: number
            title: "General"
            minimum: 0.1
            maximum: 0.5
        level_3:
          target_pct:
            value: 0.06
            type: number
            title: "General"
            minimum: 0.02
            maximum: 0.2
          exit_pct:
            value: 0.34
            type: number
            title: "General"
            minimum: 0.1
            maximum: 1.0
            description: "No description"

    #
    stop_loss:
      _section:
        title: "General"
      method:
        value: "atr"
        type: string
        title: "General"
        enum: ["atr", "fixed", "trailing", "indicator", "none"]
        description: "No description"
      atr:
        multiplier:
          value: 2.0
          type: number
          title: " ATR "
          minimum: 0.5
          maximum: 10.0
          description: "ATR "
          optimization:
            enabled: true
            range: [1.0, 5.0]
            step: 0.5
      fixed:
        value:
          value: 0.02
          type: number
          title: "General"
          minimum: 0.005
          maximum: 0.1
          description: "No description"
      trailing:
        _section:
          title: "General"
        enabled:
          value: false
          type: boolean
          title: "General"
          description: "No description"
        activation_pct:
          value: 0.02
          type: number
          title: "General"
          minimum: 0.01
          maximum: 0.1
          description: "No description"
        trailing_pct:
          value: 0.015
          type: number
          title: "General"
          minimum: 0.005
          maximum: 0.05
          description: "No description"
      indicator:
        type:
          value: "supertrend"
          type: string
          title: "General"
          enum: ["supertrend", "ma", "sar"]
          description: "No description"
      break_even:
        _section:
          title: "General"
          description: "No description"
        enabled:
          value: false
          type: boolean
          title: "General"
        activation_pct:
          value: 0.015
          type: number
          title: "General"
          minimum: 0.005
          maximum: 0.05
          description: " 1.5% "
        offset:
          value: 0.001
          type: number
          title: "General"
          minimum: 0
          maximum: 0.005
          description: " 0.1% ()"

  # Tick
  tick_monitoring:
    _section:
      title: "Tick "
      description: " tick /"
    enabled:
      value: true
      type: boolean
      title: " Tick "
      description: " tick  SL/TP"
    tick_type:
      value: "trade"
      type: string
      title: "Tick "
      enum: ["trade", "quote", "both"]
      description: "trade: ; quote: ; both: "

