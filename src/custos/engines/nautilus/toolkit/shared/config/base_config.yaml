# =============================================================================
# 指标预热配置
# =============================================================================
# 预热是指在策略开始交易前，需要积累足够的历史数据来计算技术指标。
# 支持三种模式：
#   - none: 不预热，指标从实时数据开始计算
#   - warmup: 请求历史数据计算指标 (推荐)
#   - snapshot: 从快照加载指标状态，快速恢复
# =============================================================================
warmup:
  _section:
    title: "指标预热配置"
    description: "配置策略指标的预热方式，确保信号有效性"

  mode:
    value: "none"
    type: string
    title: "预热模式"
    enum: ["none", "snapshot", "warmup"]
    description: |
      none: 不预热，指标从零开始计算 (适合首次运行)
      warmup: 请求历史 K 线数据计算指标 (推荐，适合大多数场景)
      snapshot: 从快照恢复指标状态 (适合重启后快速恢复)

  # 历史数据配置 (mode="warmup" 时使用)
  history:
    _section:
      title: "历史数据配置"
      description: "warmup 模式下的历史数据请求参数"
    min_bars:
      value: 500
      type: integer
      title: "最小 K 线数"
      minimum: 50
      maximum: 5000
      description: "指标计算所需的最小历史 K 线数量"
    preferred_bars:
      value: 2000
      type: integer
      title: "首选 K 线数"
      minimum: 100
      maximum: 10000
      description: "理想情况下请求的历史 K 线数量，确保指标稳定"
    timeout_secs:
      value: 30
      type: integer
      title: "数据请求超时"
      minimum: 5
      maximum: 300
      description: "秒，历史数据请求超时时间"

  # 快照配置 (mode="snapshot" 时使用)
  snapshot:
    _section:
      title: "指标快照配置"
      description: "snapshot 模式下的指标初始状态，支持从 TradingView 等外部源对齐"

    timestamp:
      value: null
      type: string
      title: "快照时间戳"
      description: "ISO 8601 格式，如 2024-01-01T00:00:00Z"

    # 指标快照值 (由具体策略覆盖)
    # 每个策略应定义其使用的指标的快照格式
    # 示例：SuperTrend 指标快照
    indicators:
      _section:
        title: "指标快照值"
        description: "各指标的状态快照，策略在 config.yaml 中覆盖此节"

      # 示例：趋势指标 (SuperTrend)
      # supertrend:
      #   value: 45000.0       # SuperTrend 线价格
      #   trend: 1             # 趋势方向: 1=看涨, -1=看跌, 0=未初始化
      #   upper_band: 45500.0  # 上轨 (下跌趋势时的阻力位)
      #   lower_band: 44500.0  # 下轨 (上涨趋势时的支撑位)

      # 示例：动量指标 (RSI)
      # rsi:
      #   value: 55.0          # RSI 值 (0-100)
      #   avg_gain: 0.5        # 平均涨幅
      #   avg_loss: 0.4        # 平均跌幅

      # 示例：均线指标 (EMA)
      # ema_20:
      #   value: 44800.0       # EMA 值

    # 检查点验证配置
    checkpoints:
      _section:
        title: "检查点验证"
        description: "快照恢复后的验证点，确保指标计算正确"

      tolerance_pct:
        value: 0.1
        type: number
        title: "容差百分比"
        minimum: 0.01
        maximum: 1.0
        description: "指标值允许的偏差百分比 (0.1 = 0.1%)"

      trend_strict:
        value: true
        type: boolean
        title: "趋势严格匹配"
        description: "趋势方向是否必须完全匹配"

      # 验证点列表
      points:
        value: []
        type: array
        title: "验证点列表"
        description: |
          格式示例:
          - offset_bars: 5
            bar_close_time: "2024-01-01T05:00:00Z"
            supertrend:
              value: 45100.0
              trend: 1

