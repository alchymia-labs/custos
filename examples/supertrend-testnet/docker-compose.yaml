# Custos 0.3.0 runner consuming Crucible-owned signed deployment commands.
services:
  runner:
    image: custos-runner:v0.3.0
    pull_policy: never
    environment:
      SOPS_AGE_KEY_FILE: /home/custos/.arx/age.key
      CRUCIBLE_DOMAIN_EVENT_KEY_ID: ${CRUCIBLE_DOMAIN_EVENT_KEY_ID}
    volumes:
      - ./strategy:/opt/custos/strategies/supertrend:ro
      - ./runtime/.arx:/home/custos/.arx
    command:
      - start
      - --nats-url
      - ${CRUCIBLE_NATS_URL:-nats://host.docker.internal:4222}
      - --engine
      - nautilus
      - --vault-dir
      - /home/custos/.arx/vault
      - --crucible-domain-public-key
      - /home/custos/.arx/crucible-domain-event.pub
      - --crucible-domain-key-id
      - ${CRUCIBLE_DOMAIN_EVENT_KEY_ID}
    healthcheck:
      test: ["CMD", "arx-runner", "health"]
      interval: 2s
      timeout: 2s
      retries: 15
