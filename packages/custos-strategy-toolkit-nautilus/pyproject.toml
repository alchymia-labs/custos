[project]
name = "custos-strategy-toolkit-nautilus"
version = "0.1.0"
description = "NautilusTrader adapter distribution for the Custos strategy toolkit"
requires-python = ">=3.12,<3.13"
dependencies = [
    "custos-strategy-toolkit==0.1.0",
    "nautilus-trader==1.230.0",
    "pyyaml>=6",
    "setuptools>=50,<70",
    "packaging",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/custos_toolkit_nautilus"]

[tool.mypy]
strict = true
python_version = "3.12"
mypy_path = "src"
files = ["src/custos_toolkit_nautilus"]
