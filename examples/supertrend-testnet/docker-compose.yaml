# custos supertrend-testnet example.
#
# One custos runner reconciling a single Binance testnet deployment, plus a
# local NATS with JetStream. Runtime identity and per-key encrypted credentials
# live together under ./runtime/.arx and are mounted into the runner.
#
# Copy .env.example to .env and adjust the non-secret runtime config. Exchange
# credentials are provisioned with arx-runner vault put (see README).
services:
  nats:
    image: nats:2.10-alpine
    command: ["-js"] # JetStream: deployment_spec + telemetry streams
    ports:
      - "4222:4222"

  runner:
    build:
      context: ../..
      dockerfile: examples/supertrend-testnet/Dockerfile
    depends_on:
      - nats
    environment:
      SOPS_AGE_KEY_FILE: /root/.arx/age.key
    volumes:
      - ./strategy:/app/strategy:ro
      - ./runtime/.arx:/root/.arx
    command:
      - start
      - --nats-url
      - ${ARX_NATS_URL}
      - --reconcile-strategy-id
      - ${ARX_STRATEGY_ID}
      # Select the real NautilusTrader host so testnet execution actually runs.
      # The G6 gate still guards every live deploy regardless of this flag.
      - --use-nt-host
      - --vault-dir
      - /root/.arx/vault
