# custos/.forge/teams.yaml
# Forge plan-team / execute-team / architect-team / ops-team agent teams configuration.
# Schema: forge/docs/teams/ORG-CHART.md §10 + §19 (ops_team from plan 58)
# Drafted: 2026-07-07 (custos 独立仓库首次接入 forge Agent Teams via /forge:bootstrap --teams)
#
# custos 特化说明:
# - 单栈 Python daemon (无 Rust / TypeScript / Web), 只有一个 executor area (runner)
# - non-custodial 承重墙: safety.touched_paths 覆盖 src/custos/ 全部模块
# - independent open-source repo: authority_docs 含 workspace 生态参照 (../../.claude/rules/*),
#   独立 clone 场景不可用但当前 workspace 内 executor 可访问; Plan 01 close-out 后补齐本地 .claude/rules/
# - 预算收紧 (drafters=2 / codex_max=3, arx 是 4/5): custos 简单单栈, plan 复杂度低

project: custos

# 权威文档路径 (scout 据此跑 sed/grep, zero paraphrase 引用)
# 路径相对 custos 仓库 root (~/.../tesseract-trading/custos/)
# workspace 生态参照 (../../codex, ../../.claude) 独立 clone 后不可见, 独立场景由本地 .claude/rules/ 兜底
authority_docs:
  # custos 自身权威 (最优先)
  - README.md                          # non-custodial 门面 + 承重墙原则
  - docs/domain.md                     # 顶层纸面 spec (6 BC + 分层信任边界专章)
  - docs/nautilus_host.md              # module design (G6 gate 主载体)
  - docs/reconcile.md                  # module design (declarative loop + 失联≠停止)
  - docs/credential_vault.md           # module design (KEK 红线)
  - docs/telemetry_actor.md            # module design (脱敏红线)
  - docs/enrollment.md                 # module design (EnrollmentToken 一次性)
  - docs/nats_client.md                # module design (subject naming + envelope schema)
  # workspace 生态权威 (独立 clone 后失效, 当前 workspace 可用)
  - ../../.claude/rules/mandatory-rules.md    # 生态强制规则
  - ../../.claude/rules/tech-stack.md         # 生态技术栈
  - ../../.claude/rules/historical-lessons.md # 生态 lesson (34+ 条)
  - ../../codex/decisions/ADR-012-arx-coordinator-shift.md      # custos 独立化决策源
  - ../../codex/decisions/ADR-014-ecosystem-open-source-boundary.md  # 生态开源边界
  # 未来 Plan 01 close-out 后本地补齐 (drafter 阶段暂缺):
  # - CLAUDE.md
  # - .claude/rules/mandatory-rules.md (custos non-custodial 4 红线)
  # - .claude/rules/historical-lessons.md (custos 精华继承)

# Claude Code agent teams 设置
claude_code:
  teammate_mode: auto      # 与 arx 一致 (cmux 内 in-process 禁用, plan 66 陷阱 2)
  pane_split_direction: vertical
  models:
    # 值类型: opus | sonnet | dynamic | <model-id>
    # <model-id> 显式 pin 禁裸 opus (会解析到 opus-4-8, CEO 2026-07-06 禁)
    defaults:
      leader: claude-opus-4-7[1m]   # leader 编排装配多 plan/spec, [1m] 保留防 truncate
      teammate: sonnet
    by_role:
      # opus + [1m] 判据: 输入常超 200K, [1m] 是防 truncate 而非"更强"
      # 去 [1m] 判据: 单 plan / 单议题, 200K 内, 落默认 context 与 [1m] 同价但避 2x 超额段
      safety-validator: claude-opus-4-6           # 8-checklist 红线核查, 200K 内
      chief-architect: claude-opus-4-7            # 议会仲裁读辩论输出, 200K 内
      arbitrator: claude-opus-4-7                 # 仲裁书签发, 200K 内
      # sonnet 辅助专家 (chief-architect 已 opus 兜底; custos 单栈 Python 简单项目)
      domain-architect: sonnet
      python-architect: sonnet
      # sonnet 角色 (专用工具 / 装配 / 监督 / 内审)
      evidence-scout: claude-sonnet-4-5[1m]       # Foundation Scan grep 6 模块 + 权威文档, 可能超 200K, sonnet [1m] 段仍便宜
      handoff-packager: sonnet
      worktree-manager: sonnet
      tdd-enforcer: sonnet
      intra-plan-reviewer: sonnet                 # 内审非终审, chief-architect + codex 兜底
      # dynamic 角色 (按 dynamic_rules 判定升级)
      plan-drafter: dynamic
      runner-executor: dynamic          # custos 唯一 executor area
      authority-reviewer: dynamic
      # 未启用 (custos 无对应 area, arx 有):
      # backend-executor: (Rust, custos 无)
      # web-executor: (TypeScript, custos 无)
    dynamic_rules:
      escalate_to_opus_when:
        # 通用
        - task touches safety.touched_paths
        - task introduces or modifies a trait/abstract interface   # e.g. NautilusHostProtocol / CredentialVaultProtocol
        - task involves cross-BC contract (types / events / envelope schema)
        - task is plan-drafter and plan covers CRITICAL safety contract
        - task involves money math                                  # e.g. ReconResult str(Decimal) wire
        # custos 特化
        - task involves non-custodial trust boundary (key/plaintext lifetime, KEK 派生 / vault decrypt)
        - task involves G6 gate logic (NoopHost / NtTradingNodeHost / live-paper physical isolation)
        - task involves telemetry_actor 脱敏契约 (上报事件 payload 涉 credential)
        - task explicitly tagged HIGH-RISK in plan or handoff packet
    budget:
      max_opus_spawns_per_session: 5   # 8 → 5 (custos 单栈简单项目, 额度紧张期; 留 fix 余量, CEO 2026-07-09)
      warn_at: 3
      on_exceed: refuse_and_log

# Safety 路径 (plan approval gate 命中即触发, 对应 domain-model.md 红线)
# 收窄到 3 条红线中枢 (Non-Custodial 4 红线的可执行载体), 其余模块虽然重要但违反不会
# 触及承重墙, 走常规 review 即可; 避免 dynamic executor 一律升 opus (原 8 条覆盖整个
# src/custos/ 等于 runner-executor 每次都命中)
safety:
  touched_paths:
    # 红线 0.1 Key/KEK 永不出进程 — vault 是唯一解密入口
    - src/custos/core/credential_vault.py
    # 红线 0.2 G6 host gate 不绕过 — nautilus host 是 gate 主载体
    - src/custos/engines/nautilus/host.py
    # 红线 0.3 失联 ≠ 停止 — reconciler 是 local fallback breaker 载体
    - src/custos/core/deployment_reconciler.py
    # 其余模块 (telemetry_actor / reconcile / nats_client / enrollment / risk) 通过
    # dynamic_rules 其他判据兜底 (trait/interface 改动 / cross-BC contract / money math /
    # non-custodial trust boundary), 不再靠 safety.touched_paths 大网升 opus

# Planner Dept 配置
planner_team:
  drafters_per_session: 2       # custos 简单单栈, 2 并行 drafter 已够 (arx 是 4)
  evidence_scout_enabled: true  # scout 强制开 (zero paraphrase 实证基础)

# Executor Dept 配置
executor_team:
  areas:
    - { name: runner, lang: python, root: src/custos }   # custos 唯一 area
  safety_validator:
    checklist:
      # 来自 docs/domain.md 红线 + README.md trust boundary
      - Key / plaintext 永不出 custos 进程内存 (KEK 派生仅 request-scoped)
      - G6 gate 逻辑不绕过 (live mode + NoopHost → RuntimeError; NtTradingNodeHost venue capability 校验)
      - 失联 ≠ 停止 (NATS 断连时本地 NT 继续跑, reconcile loop 不阻塞)
      - 对账不静默 (recon_result 独立 subject, ReconResult 用 str(Decimal))
      - 上报事件不含 key 明文 / 策略源码 (脱敏 sha8 / hint)
      - EnrollmentToken 一次性 + paper_only=true 的 token 永不发放 live scope
      - Python 用 uv (禁 pip, 禁 python -m pip)
      - silent path 必接 structlog (lesson #21)

# Architect Dept 配置
architect_team:
  experts: [domain, safety, python]    # custos Python 单栈, 替 arx 的 rust; 无 web 专家

# Ops Department (ORG-CHART §19, plan 58)
# custos 是 self-hosted daemon, ops 主要面向 sandbox/testnet/live 逐档部署 + 对账巡检
ops_team:
  enabled: true
  roles:
    # 共享枢纽
    - ops-lead
    - ops-packager
    # inspect mode 专属
    - inspector
    - risk-analyzer       # 共享 inspect + incident
    # deploy mode 专属
    - deployer
    - canary-observer
    - rollback-officer
    # incident mode 专属
    - incident-coordinator
    - sre-diagnostician
  safety:
    # plan-approval-enforcer 强制 approval 路径
    touched_paths:
      - ".forge/plans/**/deploy-*"
      - ".forge/plans/**/prescription-*"
      - ".forge/reviews/**/inspect-*"
  dispatch:
    # 三 mode 的 spawn 顺序 (与 ORG-CHART §19.1 协作顺序约束一致)
    inspect: "inspector + risk-analyzer (并行) → ops-packager"
    deploy: "deployer → canary-observer + rollback-officer (并行) → ops-packager"
    incident: "incident-coordinator → sre-diagnostician + risk-analyzer (并行) → ops-packager"
  vigil_bridge:
    # vigil plugin 是可选工具 (ORG-CHART §19.3)
    probe: "command -v vigil || -d \"$HOME/.claude/plugins/vigil\""
    fallback: "native bash + sql"

# codex 顾问公司 (外部独立第二意见)
codex_audit:
  enabled: true
  failure_fallback: gemini              # codex 不可用时降级 (lesson #10/#12 模板)
  fallback_model: claude-opus-4-7       # Claude-skeptic session 模型 (ORG-CHART §5 fallback); 去 [1m], 单议题 200K 内
  # 注意: fallback 不替代真 codex 跨模型独立意见 (见 ORG-CHART §5 CEO 复核须知)
  budget:
    max_codex_calls_per_plan: 1         # 3 → 1 (额度紧张期, 触及红线的 plan 才开)
    warn_at: 1
    on_exceed: refuse_and_log
