name: Protected toolkit RC release runner

on:
  workflow_dispatch:
    inputs:
      candidate_version:
        description: Immutable candidate version in the form 0.1.0rcN
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: toolkit-rc-${{ inputs.candidate_version }}
  cancel-in-progress: false

jobs:
  release-candidate:
    if: github.repository == 'alchymia-labs/custos' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment: toolkit-rc-release
    env:
      SOURCE_DATE_EPOCH: '1704067200'
      CUSTOS_TOOLKIT_RELEASE_ENVIRONMENT: toolkit-rc-release
      CUSTOS_TOOLKIT_OCI_REGISTRY: ghcr.io
      CUSTOS_TOOLKIT_OCI_REPOSITORY: alchymia-labs/custos-strategy-toolkit
      CUSTOS_TOOLKIT_OCI_USERNAME: ${{ github.actor }}
      CUSTOS_TOOLKIT_OCI_TOKEN: ${{ github.token }}
      EXPECTED_SIGSTORE_IDENTITY: >-
        https://github.com/alchymia-labs/custos/.github/workflows/release-toolkit-rc.yml@refs/heads/main
      EXPECTED_SIGSTORE_ISSUER: https://token.actions.githubusercontent.com
    steps:
      - name: Check out the exact protected-main commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Install the pinned uv release toolchain
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.11.16'
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Hydrate the locked release environment
        shell: bash
        run: |
          set -euo pipefail
          uv sync --frozen --extra lts
          uv run --frozen --extra lts python --version
          uv run --frozen --extra lts sigstore --version

      - name: Validate immutable operator input and release tools
        shell: bash
        run: |
          set -euo pipefail
          [[ "${{ inputs.candidate_version }}" =~ ^0\.1\.0rc[1-9][0-9]*$ ]]
          test "$GITHUB_REPOSITORY" = "alchymia-labs/custos"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$CUSTOS_TOOLKIT_OCI_REGISTRY" = "ghcr.io"
          test "$CUSTOS_TOOLKIT_OCI_REPOSITORY" = "alchymia-labs/custos-strategy-toolkit"
          test -n "$CUSTOS_TOOLKIT_OCI_USERNAME"
          test -n "$CUSTOS_TOOLKIT_OCI_TOKEN"
          command -v uv
          uv --version
          uv run --frozen --extra lts sigstore --version

      - name: Rebuild and compare both toolkit distributions offline
        shell: bash
        run: |
          set -euo pipefail
          uv run --frozen --extra lts python scripts/toolkit_rc_build.py \
            --repository-root "$GITHUB_WORKSPACE" \
            --source-commit "$GITHUB_SHA" \
            --source-date-epoch "$SOURCE_DATE_EPOCH" \
            --candidate-version "${{ inputs.candidate_version }}" \
            --output-root "$RUNNER_TEMP/toolkit-rc-build"

      - name: Generate formal SBOM lock and provenance inputs
        shell: bash
        run: |
          set -euo pipefail
          uv run --frozen --extra lts python scripts/toolkit_rc_release_readiness.py prepare \
            --repository-root "$GITHUB_WORKSPACE" \
            --build-root "$RUNNER_TEMP/toolkit-rc-build" \
            --output-root "$RUNNER_TEMP/toolkit-rc-readiness"

      - name: Sign and verify the complete SLSA provenance with OIDC
        shell: bash
        run: |
          set -euo pipefail
          provenance="$RUNNER_TEMP/toolkit-rc-readiness/toolkit-rc.intoto.json"
          bundle="$RUNNER_TEMP/toolkit-rc-provenance.sigstore.json"
          uv run --frozen --extra lts sigstore sign --bundle "$bundle" "$provenance"
          uv run --frozen --extra lts sigstore verify identity \
            --bundle "$bundle" \
            --cert-identity "$EXPECTED_SIGSTORE_IDENTITY" \
            --cert-oidc-issuer "$EXPECTED_SIGSTORE_ISSUER" \
            "$provenance"

      - name: Assemble digest-pinned T6a and T6c inputs
        shell: bash
        run: |
          set -euo pipefail
          uv run --frozen --extra lts python scripts/toolkit_rc_release_readiness.py assemble \
            --repository-root "$GITHUB_WORKSPACE" \
            --build-root "$RUNNER_TEMP/toolkit-rc-build" \
            --readiness-root "$RUNNER_TEMP/toolkit-rc-readiness" \
            --sigstore-bundle "$RUNNER_TEMP/toolkit-rc-provenance.sigstore.json" \
            --output-root "$RUNNER_TEMP/toolkit-rc-publication-inputs"

      - name: Commit one OCI manifest and verify digest readback
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          uv run --frozen --extra lts python -m scripts.toolkit_rc_publish \
            --manifest "$RUNNER_TEMP/toolkit-rc-publication-inputs/toolkit-rc-manifest.json" \
            --build-manifest "$RUNNER_TEMP/toolkit-rc-build/toolkit-rc-build-manifest-input.json" \
            --object-sources "$RUNNER_TEMP/toolkit-rc-publication-inputs/toolkit-rc-object-sources.json" \
            --registry "$CUSTOS_TOOLKIT_OCI_REGISTRY" \
            --repository "$CUSTOS_TOOLKIT_OCI_REPOSITORY" \
            --pending-receipt "$RUNNER_TEMP/toolkit-rc-remote-publication-pending.json" \
            --production-release-runner
          sha256sum "$RUNNER_TEMP/toolkit-rc-remote-publication-pending.json"

      - name: Report immutable OCI authority handoff
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "oci_coordinate=${{ steps.publish.outputs.oci_coordinate }}"
          printf '%s\n' "manifest_digest=${{ steps.publish.outputs.manifest_digest }}"
