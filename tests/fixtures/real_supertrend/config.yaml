# =============================================================================
# The Alephain Guild - SuperTrend
# =============================================================================
# ATR-based trend following strategy
# =============================================================================

# =============================================================================
#  ()
# =============================================================================
strategy:
  name: "SuperTrend"
  version: "2.1.0"
  author: "The Alephain Guild"
  description: " ATR /"

# =============================================================================
#
# =============================================================================
parameters:
  _section:
    title: "General"
    description: "SuperTrend "
  atr_period:
    value: 10
    type: integer
    title: "ATR "
    description: "ATR "
    minimum: 5
    maximum: 50
    optimization:
      enabled: true
      range: [5, 50]
      step: 1
  atr_multiplier:
    value: 3.0
    type: number
    title: "ATR "
    description: "SuperTrend "
    minimum: 1.0
    maximum: 10.0
    optimization:
      enabled: true
      range: [1.0, 10.0]
      step: 0.5

# =============================================================================
#
# =============================================================================
warmup:
  _section:
    title: "General"
    description: " ( TradingView) "
  mode:
    value: "none"
    type: string
    title: "General"
    enum: ["none", "snapshot", "warmup"]
    description: "none: ; snapshot: ; warmup: "
  history:
    _section:
      title: "General"
      description: "warmup "
    min_bars:
      value: 500
      type: integer
      title: "K"
      minimum: 100
      maximum: 5000
      description: "K"
    preferred_bars:
      value: 2000
      type: integer
      title: "K"
      minimum: 500
      maximum: 10000
      description: "K"
    timeout_secs:
      value: 30
      type: integer
      title: "General"
      minimum: 5
      maximum: 120
      description: "No description"
  snapshot:
    _section:
      title: "General"
      description: "snapshot  ( TradingView )"
    timestamp:
      value: null
      type: string
      title: "General"
      description: "ISO 8601  2024-01-01T00:00:00Z"
    indicators:
      supertrend:
        _section:
          title: "SuperTrend "
        value:
          value: 0.0
          type: number
          title: "SuperTrend "
          description: " SuperTrend "
        trend:
          value: 0
          type: integer
          title: "General"
          enum: [-1, 0, 1]
          description: "1: , -1: , 0: "
        upper_band:
          value: 0.0
          type: number
          title: "General"
          description: "No description"
        lower_band:
          value: 0.0
          type: number
          title: "General"
          description: "No description"

# =============================================================================
#
# =============================================================================
trading:
  _section:
    title: "General"
  connector:
    value: "binance_perpetual"
    type: string
    title: "General"
    enum: ["binance", "binance_perpetual", "okx_perpetual", "kucoin"]
    description: "No description"
  leverage:
    value: 1
    type: integer
    title: "General"
    minimum: 1
    maximum: 125
    description: "No description"
  pairs:
    value: ["BTC-USDT"]
    type: array
    title: "General"
    description: "No description"
  direction:
    value: "both"
    type: string
    title: "General"
    enum: ["long", "short", "both"]
    description: "No description"
  order_type:
    value: "market"
    type: string
    title: "General"
    enum: ["market", "limit"]
    description: "No description"

# =============================================================================
#
# =============================================================================
position:
  _section:
    title: "General"
  size_type:
    value: "percentage"
    type: string
    title: "General"
    enum: ["percentage", "fixed", "kelly", "fixed_risk"]
    description: "No description"
  size_value:
    value: 0.1
    type: number
    title: "General"
    minimum: 0.01
    maximum: 1.0
    description: " (percentage )  (fixed )"
    optimization:
      enabled: true
      range: [0.05, 0.3]
      step: 0.05
  capital_mode:
    value: "compound"
    type: string
    title: "General"
    enum: ["compound", "fixed_capital"]
    description: "No description"
  initial_capital:
    value: 10000
    type: number
    title: "General"
    minimum: 100
    description: "fixed_capital "

# =============================================================================
#  ()
# =============================================================================
platforms:
  hummingbot:
    candles_exchange: null
    candles_pair: null
    candles_interval: "1h"
  nautilus:
    venue:
      value: "BINANCE"
      type: string
      title: "General"
    bar_type:
      value: "1-MINUTE"
      type: string
      title: "K"
    trading_node:
      _section:
        title: "General"
        description: "NautilusTrader TradingNode "
      timeout_connection:
        value: 60.0
        type: number
        title: "General"
      timeout_reconciliation:
        value: 10.0
        type: number
        title: "General"
      timeout_portfolio:
        value: 10.0
        type: number
        title: "General"
      timeout_disconnection:
        value: 10.0
        type: number
        title: "General"
      reconciliation_lookback_mins:
        value: 1440
        type: integer
        title: "General"
      database:
        _section:
          title: "Redis "
          description: " Redis "
        enabled:
          value: true
          type: boolean
          title: " Redis"
          description: " Redis  Redis "
        type:
          value: "redis"
          type: string
          title: "General"
        host:
          value: "redis"
          type: string
          title: "General"
          description: "Docker Compose  IP "
        port:
          value: 6379
          type: integer
          title: "General"
        username:
          value: null
          type: string
          title: "General"
          description: " Redis "
        password:
          value: null
          type: string
          title: "General"
          description: " Redis "
      cache:
        _section:
          title: "General"
          description: "NautilusTrader "
        tick_capacity:
          value: 10000
          type: integer
          title: "Tick "
          description: " tick "
        bar_capacity:
          value: 10000
          type: integer
          title: "Bar "
          description: " bar "
        buffer_interval_ms:
          value: 100
          type: integer
          title: "General"
          description: " 10-1000ms"
        flush_on_start:
          value: false
          type: boolean
          title: "General"
          description: "No description"
      message_bus:
        _section:
          title: "General"
          description: "NautilusTrader "
        autotrim_mins:
          value: 1440
          type: integer
          title: "General"
          description: "24=1440"
        buffer_interval_ms:
          value: 100
          type: integer
          title: "General"
          description: "No description"
        heartbeat_interval_secs:
          value: 10
          type: integer
          title: "General"
          description: "No description"

# =============================================================================
#  (medium tier production defaults)
# =============================================================================
# supertrend production tier: activates the shared RiskController drawdown
# breaker with values tuned by strategy owner review (see custos plan
# 06 DEV-06-RISK-CONTROLLER-PARAMS). Overrides shared/config/base_config.yaml
# `risk.global.*` defaults via deep_merge.
risk:
  _section:
    title: "General"
  global:
    _section:
      title: "General"
      description: "supertrend : medium tier (max_daily_loss 5% / max_drawdown 15% /  5)"
    max_daily_loss:
      value: 0.05
      type: number
      title: "General"
      description: " — medium tier"
    max_drawdown:
      value: 0.15
      type: number
      title: "General"
      description: " — medium tier"
    consecutive_loss_pause:
      value: 5
      type: integer
      title: "General"
      description: " N  — medium tier"

# =============================================================================
#  (Redis )
# =============================================================================
# : Redis  platforms.nautilus.trading_node.database
#  database.enabled  snapshot.enabled
snapshot:
  _section:
    title: "General"
    description: " RedisRedis  trading_node.database "
  enabled:
    value: false
    type: boolean
    title: "General"
    description: " trading_node.database"
  key_prefix:
    value: "nautilus:snapshot:supertrend"
    type: string
    title: "General"
    description: "Redis "
  save_interval_bars:
    value: 100
    type: integer
    title: "General"
    description: " N K"
    minimum: 10
    maximum: 1000
  save_on_stop:
    value: true
    type: boolean
    title: "General"
    description: "No description"
