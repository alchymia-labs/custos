[project]
name = "custos-runner"
version = "0.0.0"
description = "Custos: non-custodial self-hosted runner for the Alephain Guild ecosystem (NautilusTrader-adjacent, declarative reconcile + telemetry actor + local key vault)"
requires-python = ">=3.11"
dependencies = [
    "nats-py>=2.9",
    "pydantic>=2.5",
    "structlog>=24",
    "uuid6>=2024.1.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.6",
]
# Production NautilusTrader host runtime. Heavy; kept optional so audit-only /
# paper-mode installs (NoopHost) don't pull it. NautilusTrader 1.227+ only
# supports Python >=3.12, so it is gated behind an environment marker: the base
# package stays installable on Python 3.11 (audit / paper), while nt-runtime
# resolves NautilusTrader only on 3.12+. Install with
# `uv sync --extra nt-runtime` (needs a 3.12+ interpreter) or
# `pip install custos-runner[nt-runtime]`.
nt-runtime = [
    "nautilus-trader>=1.227; python_version >= '3.12'",
    "pyyaml>=6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# pip 分发名是 custos-runner (project.name), 但 Python 导入名保留 arx_runner
# (README §Quick Start + mandatory-rules.md §2 声明的已知 boundary constant, rename
# 是独立 plan). 显式告诉 hatchling 打包 src/arx_runner/.
packages = ["src/arx_runner"]

[tool.uv]
package = true

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
# 与生态其他 Python 子系统 (synedrion) 一致的 line-length; custos 现有代码
# 也在 100 上下, 减少 subtree split 后无谓 fmt sweep.
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade (Python 3.11+ syntax)
]
ignore = [
    "E501",  # line-too-long: 由 ruff format 兜底
    "B008",  # do not perform function calls in argument defaults (fastapi Depends 惯例)
]
