# =============================================================================
filters:
  _section:
    title: "General"

  adx_filter:
    _section:
      title: "ADX "
    enabled:
      value: false
      type: boolean
      title: " ADX "
      description: " ADX "
    period:
      value: 14
      type: integer
      title: "ADX "
      minimum: 7
      maximum: 30
    threshold:
      value: 25
      type: number
      title: "ADX "
      minimum: 15
      maximum: 50
      description: "ADX "
      optimization:
        enabled: true
        range: [20, 40]
        step: 5

  volatility_filter:
    _section:
      title: "General"
    enabled:
      value: false
      type: boolean
      title: "General"
      description: "No description"
    min_atr_pct:
      value: 0.003
      type: number
      title: " ATR  (, 0.003=0.3%)"
      minimum: 0.001
      maximum: 0.01
      description: "ATR/ "
    max_atr_pct:
      value: 0.05
      type: number
      title: " ATR  (, 0.05=5%)"
      minimum: 0.01
      maximum: 0.1
      description: "ATR/  ()"
    atr_lookback:
      value: 14
      type: integer
      title: "ATR "
      minimum: 5
      maximum: 50
      description: " ( atr_period)"

  volume_filter:
    _section:
      title: "General"
    enabled:
      value: false
      type: boolean
      title: "General"
      description: "No description"
    ma_period:
      value: 20
      type: integer
      title: "MA "
      minimum: 5
      maximum: 50
    threshold:
      value: 1.2
      type: number
      title: "General"
      minimum: 1.0
      maximum: 3.0
      description: " MA "

  time_filter:
    _section:
      title: "General"
    enabled:
      value: false
      type: boolean
      title: "General"
      description: "No description"
    trading_hours:
      value: "00:00-23:59"
      type: string
      title: "General"
      description: "UTC ,  HH:MM-HH:MM"
    excluded_days:
      value: []
      type: array
      title: "General"
      description: "0=, 6="
    excluded_dates:
      value: []
      type: array
      title: "General"
      description: " YYYY-MM-DD"

  cooldown:
    _section:
      title: "General"
    min_holding_time:
      value: 0
      type: integer
      title: "General"
      minimum: 0
      description: "No description"
    after_exit:
      value: 0
      type: integer
      title: "General"
      minimum: 0
    after_stop_loss:
      value: 300
      type: integer
      title: "General"
      minimum: 0
      description: "No description"
    after_take_profit:
      value: 0
      type: integer
      title: "General"
      minimum: 0

  mtf_filter:
    _section:
      title: "General"
    enabled:
      value: false
      type: boolean
      title: " MTF "
      description: "No description"
    higher_timeframe:
      value: "4h"
      type: string
      title: "General"
      enum: ["1h", "4h", "1d"]
      description: "No description"
    alignment_mode:
      value: "same_direction"
      type: string
      title: "General"
      enum: ["same_direction", "not_against"]
      description: "same_direction: ; not_against: "

  regime_filter:
    _section:
      title: "General"
    enabled:
      value: false
      type: boolean
      title: "General"
      description: "No description"
    method:
      value: "efficiency_ratio"
      type: string
      title: "General"
      enum: ["adx_slope", "atr_percentile", "efficiency_ratio"]
      description: "adx_slope: ADX; atr_percentile: ATR; efficiency_ratio: "
    lookback:
      value: 20
      type: integer
      title: "General"
      minimum: 10
      maximum: 100
    trending_threshold:
      value: 0.5
      type: number
      title: " (efficiency_ratio)"
      minimum: 0.3
      maximum: 0.8
      description: " efficiency_ratio  (0..1)"
    range_pct_threshold:
      value: 0.03
      type: number
      title: " (atr_percentile)"
      minimum: 0.005
      maximum: 0.2
      description: " atr_percentile /  (, 0.03=3%)"
    adx_period:
      value: 14
      type: integer
      title: "ADX  (adx_slope)"
      minimum: 5
      maximum: 50
      description: " adx_slope  ADX "

  momentum_filter:
    _section:
      title: "General"
    enabled:
      value: false
      type: boolean
      title: "General"
      description: "No description"
    indicator:
      value: "rsi"
      type: string
      title: "General"
      enum: ["rsi", "roc", "macd"]
      description: "RSI/ROC/MACD"
    rsi:
      _section:
        title: "RSI "
      period:
        value: 14
        type: integer
        title: "RSI "
        minimum: 5
        maximum: 30
      long_min:
        value: 40
        type: number
        title: " RSI"
        minimum: 20
        maximum: 60
      long_max:
        value: 70
        type: number
        title: " RSI"
        minimum: 60
        maximum: 90
      short_min:
        value: 30
        type: number
        title: " RSI"
        minimum: 10
        maximum: 40
      short_max:
        value: 60
        type: number
        title: " RSI"
        minimum: 40
        maximum: 80
    roc:
      _section:
        title: "ROC "
      period:
        value: 10
        type: integer
        title: "ROC "
        minimum: 5
        maximum: 30
      long_threshold:
        value: 0
        type: number
        title: "General"
        description: "ROC "
      short_threshold:
        value: 0
        type: number
        title: "General"
        description: "ROC "
    macd:
      _section:
        title: "MACD "
      fast:
        value: 12
        type: integer
        title: "General"
      slow:
        value: 26
        type: integer
        title: "General"
      signal:
        value: 9
        type: integer
        title: "General"
      require_crossover:
        value: false
        type: boolean
        title: "General"
        description: " MACD "
      histogram_positive:
        value: true
        type: boolean
        title: "General"
        description: "No description"

  behavior:
    _section:
      title: "General"
    mode:
      value: "all"
      type: string
      title: "General"
      enum: ["all", "any", "weighted"]
      description: "all: ; any: ; weighted: "
    min_score:
      value: 0.6
      type: number
      title: "General"
      minimum: 0.1
      maximum: 1.0
      description: "weighted "
    weights:
      _section:
        title: "General"
        description: "weighted "
      adx_filter:
        value: 0.3
        type: number
        title: "ADX "
        minimum: 0
        maximum: 1.0
      volatility_filter:
        value: 0.25
        type: number
        title: "General"
        minimum: 0
        maximum: 1.0
      volume_filter:
        value: 0.25
        type: number
        title: "General"
        minimum: 0
        maximum: 1.0
      regime_filter:
        value: 0.2
        type: number
        title: "General"
        minimum: 0
        maximum: 1.0
    on_filter_fail:
      value: "skip"
      type: string
      title: "General"
      enum: ["skip", "reduce_size", "delay"]
      description: "skip: ; reduce_size: ; delay: "
    reduce_size_factor:
      value: 0.5
      type: number
      title: "General"
      minimum: 0.1
      maximum: 0.9
      description: "reduce_size "

